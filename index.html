const gf=(raw,k)=>{const m=raw.match(new RegExp(`${k}:\\s*([^\\n]+)`));return m?.[1]?.trim()||””;};

// API через прокси — без ключа в браузере
async function callProxy(system,messages,onChunk,onDone){
try{
const res=await fetch(”/api/chat”,{
method:“POST”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify({system,messages}),
});
const reader=res.body.getReader();
const dec=new TextDecoder();
let full=””,buf=””;
while(true){
const{done,value}=await reader.read();
if(done)break;
buf+=dec.decode(value,{stream:true});
const lines=buf.split(”\n”);
buf=lines.pop()??””;
for(const line of lines){
if(!line.startsWith(“data: “))continue;
const raw=line.slice(6).trim();
if(raw===”[DONE]”)continue;
try{const evt=JSON.parse(raw);const t=evt?.delta?.text??””;if(t){full+=t;onChunk(full);}}catch{}
}
}
onDone(full);
}catch(e){const m=`Ошибка: ${e.message}`;onChunk(m);onDone(m);}
}

function Bubble({msg}){
const[done,setDone]=useState(false);
const[count,setCount]=useState(0);
const agent=AGENTS.find(a=>a.id===msg.agentId);
const words=useMemo(()=>(msg.text||””).split(” “),[msg.text]);

useEffect(()=>{
if(msg.role!==“assistant”||msg.typing)return;
let i=0;
const t=setInterval(()=>{i++;setCount(i);if(i>=words.length){clearInterval(t);setDone(true);}},22);
return()=>clearInterval(t);
},[msg.text]);

if(msg.role===“user”)return(
<div style={{display:“flex”,justifyContent:“flex-end”,marginBottom:18}}>
<div style={{maxWidth:“80%”,background:”#161622”,border:“1px solid #2a2a44”,borderRadius:“18px 18px 4px 18px”,padding:“12px 16px”}}>

</div>
);

if(msg.typing)return(
<div style={{display:“flex”,gap:10,marginBottom:18}}>
<div style={{width:36,height:36,borderRadius:18,background:`${agent?.color}14`,border:`1.5px solid ${agent?.color}50`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:16,flexShrink:0,color:agent?.color}}>{agent?.emoji}</div>

{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:3,background:agent?.color,opacity:.5,animation:`bounce .9s ease-in-out ${i*0.15}s infinite`}}/>)}
</div>
</div>
</div>
);

return(
<div style={{display:“flex”,gap:10,marginBottom:18}}>
<div style={{width:36,height:36,borderRadius:18,background:`${agent?.color}14`,border:`1.5px solid ${agent?.color}50`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:16,flexShrink:0,color:agent?.color}}>{agent?.emoji}</div>
<div style={{flex:1}}>

</div>

</p>
</div>
</div>
</div>
);
}

async function send(){
if(!input.trim()||busy)return;
const txt=input.trim();setInput(””);setBusy(true);
const uMsg={id:Date.now(),role:“user”,text:txt};
setMsgs(prev=>[…prev,uMsg]);
const hist=[…msgs.slice(-8),uMsg].map(m=>({role:m.role===“user”?“user”:“assistant”,content:m.text}));
const toRun=AGENTS.filter(a=>activeAgents.includes(a.id));
for(const ag of toRun){
const tid=Date.now()+Math.random();
setMsgs(prev=>[…prev,{id:tid,role:“assistant”,agentId:ag.id,typing:true,text:””}]);
await new Promise(r=>setTimeout(r,250));
await new Promise(resolve=>{
callProxy(ag.system,hist,
()=>{},
(txt2)=>{setMsgs(prev=>prev.map(m=>m.id===tid?{…m,typing:false,text:txt2}:m));resolve();}
);
});
hist.push({role:“assistant”,content:`${ag.name}: `});
await new Promise(r=>setTimeout(r,180));
}
setBusy(false);
}

raw=>setStreams(prev=>({…prev,[fmt.id]:raw})),
()=>setDones(prev=>({…prev,[fmt.id]:true})),
);
});
}

const fmt=FORMATS.find(f=>f.id===activeFmt);
const raw=streams[activeFmt]||””;
const doneFmt=!!dones[activeFmt];

return(

          {gf(raw,"TAGS")&&<p style={{color:"#333",fontSize:12}}>{gf(raw,"TAGS")}</p>}
          {!doneFmt&&<span style={{display:"inline-block",width:3,height:14,background:"#c678dd",animation:"blink .7s step-end infinite"}}/>}
        </div>}

        {/* Thread */}
        {activeFmt==="thread"&&<div>
          {["T1","T2","T3","T4","T5"].map(k=>gf(raw,k)).filter(Boolean).map((t,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:4}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:36,height:36,borderRadius:18,background:"#1a2a4a",border:"1px solid #2a4a7a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#4a9eff",fontWeight:700,flexShrink:0}}>{i+1}</div>
                {i<4&&<div style={{width:1,flex:1,minHeight:20,background:"#1a2a4a",margin:"4px 0"}}/>}
              </div>
              <div style={{paddingTop:8,paddingBottom:16,flex:1}}>
                <p style={{color:"#c8c4bc",fontSize:15,lineHeight:1.7,fontFamily:"Georgia,serif"}}>{t}</p>
              </div>
            </div>
          ))}
          {!doneFmt&&<span style={{display:"inline-block",width:3,height:14,background:"#4a9eff",animation:"blink .7s step-end infinite",marginLeft:46}}/>}
        </div>}

        {/* Article */}
        {activeFmt==="article"&&<div style={{fontFamily:"Georgia,serif"}}>
          {gf(raw,"HEADLINE")&&<h1 style={{color:"#f0ece4",fontSize:22,fontWeight:700,lineHeight:1.2,marginBottom:12}}>{gf(raw,"HEADLINE")}</h1>}
          {gf(raw,"LEAD")&&<p style={{color:"#888",fontSize:15,lineHeight:1.7,marginBottom:16,fontStyle:"italic"}}>{gf(raw,"LEAD")}</p>}
          {["P1","P2","P3"].map(k=>gf(raw,k)).filter(Boolean).map((p,i)=>(
            <div key={i} style={{marginBottom:16}}>
              <p style={{color:"#b0acaa",fontSize:15,lineHeight:1.8}}>{p}</p>
            </div>
          ))}
          {gf(raw,"CLOSE")&&<p style={{color:"#e8c07d",fontSize:15,lineHeight:1.75,marginTop:12,fontStyle:"italic"}}>{gf(raw,"CLOSE")}</p>}
          {!doneFmt&&<span style={{display:"inline-block",width:3,height:14,background:"#4caf50",animation:"blink .7s step-end infinite"}}/>}
        </div>}

        {/* Script */}
        {activeFmt==="script"&&<div style={{fontFamily:"Helvetica,sans-serif"}}>
          {gf(raw,"TITLE")&&<p style={{color:"#fff",fontSize:16,fontWeight:700,marginBottom:8}}>{gf(raw,"TITLE")}</p>}
          {gf(raw,"HOOK")&&<div style={{background:"#1a0a08",border:"1px solid #3a1510",borderRadius:12,padding:14,marginBottom:14}}>
            <p style={{color:"#e8735a",fontSize:10,letterSpacing:2,marginBottom:6}}>КРЮЧОК (0–5 сек)</p>
            <p style={{color:"#f0ece4",fontSize:15,lineHeight:1.6,fontFamily:"Georgia,serif"}}>{gf(raw,"HOOK")}</p>
          </div>}
          {raw.split("\n").filter(l=>/^\d+:\d+/.test(l)).map((l,i)=>{
            const parts=l.split("|").map(s=>s.trim());
            return(
              <div key={i} style={{display:"flex",gap:12,marginBottom:10}}>
                <span style={{color:"#e8735a",fontSize:12,fontWeight:700,flexShrink:0,paddingTop:2,width:32}}>{parts[0]}</span>
                <div style={{flex:1,background:"#111",borderRadius:10,padding:"10px 12px",border:"1px solid #1e1e1e"}}>
                  {parts[1]&&<p style={{color:"#444",fontSize:11,marginBottom:4}}>📹 {parts[1]}</p>}
                  {parts[2]&&<p style={{color:"#c8c4bc",fontSize:14,lineHeight:1.6,fontFamily:"Georgia,serif"}}>🎙 {parts[2]}</p>}
                </div>
              </div>
            );
          })}
          {gf(raw,"CTA")&&<div style={{background:"#0a1a0a",borderRadius:12,padding:"12px 14px",border:"1px solid #1a3a1a",marginTop:10}}><p style={{color:"#4caf50",fontSize:14}}>🎯 {gf(raw,"CTA")}</p></div>}
          {!doneFmt&&<span style={{display:"inline-block",width:3,height:14,background:"#e8735a",animation:"blink .7s step-end infinite"}}/>}
        </div>}
      </div>

      {/* Bottom bar */}
      <div style={{flexShrink:0,background:"#080808",borderTop:"1px solid #111",padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
        <button onClick={()=>{setPhase("input");setStreams({});setDones({});}}
          style={{height:40,padding:"0 14px",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:12,color:"#666",fontSize:13,cursor:"pointer"}}>
          ← Назад
        </button>
        <div style={{flex:1,background:"#0a0a0a",borderRadius:10,padding:"8px 10px",border:"1px solid #111",overflow:"hidden"}}>
          <p style={{color:"#1e1e1e",fontSize:11,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{idea}</p>
        </div>
        <button onClick={()=>{navigator.clipboard.writeText(raw);setCopied(true);setTimeout(()=>setCopied(false),1800);}}
          style={{width:40,height:40,background:"#0e0e0e",border:`1px solid ${copied?"#4caf50":"#1a1a1a"}`,borderRadius:12,color:copied?"#4caf50":"#555",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {copied?"✓":"⎘"}
        </button>
        <button style={{height:40,padding:"0 16px",background:fmt?.color||"#e8735a",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
          Опубл. →
        </button>
      </div>
    </>}
  </>}

</div>
</>
