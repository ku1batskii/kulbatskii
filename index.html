<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KULBATSKII OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060606;color:#f0ece4;font-family:Georgia,serif;padding:24px 18px 48px;max-width:520px;margin:0 auto}
h1{color:#fff;font-size:20px;font-weight:800;letter-spacing:1px;margin-bottom:4px}
.sub{color:#333;font-size:12px;letter-spacing:2px;margin-bottom:24px}
label{display:block;color:#555;font-size:11px;letter-spacing:2px;margin-bottom:8px}
input,textarea{width:100%;background:#0e0e0e;border:1px solid #1a1a1a;border-radius:12px;color:#f0ece4;font-size:15px;padding:12px 14px;outline:none;font-family:Georgia,serif;display:block}
textarea{resize:none;caret-color:#e8735a;margin-bottom:12px}
.row{display:flex;gap:8px;margin-bottom:16px}
.row input{margin:0}
button{border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;padding:12px 18px}
#saveBtn{background:#e8735a;color:#fff;white-space:nowrap}
#launchBtn{width:100%;height:50px;background:#e8735a;color:#fff;font-size:16px;border-radius:14px;margin-bottom:20px}
#launchBtn:disabled{background:#111;color:#333;cursor:default}
#keySection{margin-bottom:20px}
#mainSection{display:none}
.card{background:#0a0a0a;border:1px solid #111;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:800;letter-spacing:3px;margin-bottom:10px}
.card-body{color:#b0aca8;font-size:15px;line-height:1.8;white-space:pre-wrap;min-height:16px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cur{display:inline-block;width:2px;height:14px;vertical-align:text-bottom;margin-left:2px;animation:blink .7s step-end infinite}
</style>
</head>
<body>

<h1>✦ KULBATSKII OS</h1>
<p class="sub">3 АГЕНТА · ПАРАЛЛЕЛЬНЫЙ СТРИМИНГ</p>

<div id="keySection">
  <label>ANTHROPIC API KEY</label>
  <div class="row">
    <input type="password" id="keyInput" placeholder="sk-ant-..."/>
    <button id="saveBtn" onclick="saveKey()">Сохранить</button>
  </div>
  <p style="color:#1e1e1e;font-size:11px">Ключ сохраняется в браузере</p>
</div>

<div id="mainSection">
  <textarea id="idea" rows="4" placeholder="Введи идею или задачу…"></textarea>
  <button id="launchBtn" onclick="launch()">✦ Запустить агентов</button>

  <div class="card">
    <p class="card-title" style="color:#e8735a">✦ MASTER</p>
    <p class="card-body" id="out-master"></p>
  </div>
  <div class="card">
    <p class="card-title" style="color:#4caf50">◈ BIZ</p>
    <p class="card-body" id="out-biz"></p>
  </div>
  <div class="card">
    <p class="card-title" style="color:#e8c07d">◎ MIND</p>
    <p class="card-body" id="out-mind"></p>
  </div>

<button onclick="resetKey()" style="background:transparent;color:#1e1e1e;font-size:12px;padding:8px;width:100%;margin-top:8px">Сменить ключ</button>

</div>

<script>
var key = localStorage.getItem("ant_key") || "";
if(key){ show(); }

function saveKey(){
  key = document.getElementById("keyInput").value.trim();
  if(!key){ alert("Введи ключ"); return; }
  localStorage.setItem("ant_key", key);
  show();
}

function show(){
  document.getElementById("keySection").style.display = "none";
  document.getElementById("mainSection").style.display = "block";
}

function resetKey(){
  localStorage.removeItem("ant_key");
  key = "";
  document.getElementById("keySection").style.display = "block";
  document.getElementById("mainSection").style.display = "none";
}

var AGENTS = [
  {id:"master", color:"#e8735a", system:"Ты — Master-агент. Анализируй идею на 3 уровнях: технология, ROI, философия. Вердикт: Go или Redesign. По-русски, до 100 слов."},
  {id:"biz",    color:"#4caf50", system:"Ты — Biz-агент. Оцени монетизацию и unit-экономику. 2-3 способа заработать. По-русски, до 100 слов."},
  {id:"mind",   color:"#e8c07d", system:"Ты — Mind-агент. Найди суть и долгосрочную ценность. Задай главный незаданный вопрос. По-русски, до 100 слов."},
];

function launch(){
  var msg = document.getElementById("idea").value.trim();
  if(!msg){ alert("Введи идею"); return; }
  var btn = document.getElementById("launchBtn");
  btn.disabled = true; btn.textContent = "Генерация…";
  AGENTS.forEach(function(a){
    document.getElementById("out-"+a.id).innerHTML = "<span class='cur' style='background:"+a.color+"'></span>";
  });
  var done = 0;
  AGENTS.forEach(function(agent){
    stream(agent, msg, function(){
      done++;
      if(done===AGENTS.length){ btn.disabled=false; btn.textContent="✦ Запустить агентов"; }
    });
  });
}

function stream(agent, msg, onDone){
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,stream:true,system:agent.system,messages:[{role:"user",content:msg}]})
  }).then(function(res){
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    var full="", buf="";
    function read(){
      reader.read().then(function(r){
        if(r.done){ onDone(); return; }
        buf += dec.decode(r.value,{stream:true});
        var lines = buf.split("\n"); buf = lines.pop()||"";
        lines.forEach(function(line){
          if(!line.startsWith("data: ")) return;
          var raw = line.slice(6).trim();
          if(raw==="[DONE]") return;
          try{
            var evt = JSON.parse(raw);
            var t = (evt.delta&&evt.delta.text)||"";
            if(t){
              full+=t;
              var el = document.getElementById("out-"+agent.id);
              if(el) el.innerHTML = full + "<span class='cur' style='background:"+agent.color+"'></span>";
            }
          }catch(e){}
        });
        read();
      });
    }
    read();
  }).catch(function(e){
    var el = document.getElementById("out-"+agent.id);
    if(el) el.textContent = "Ошибка: "+e.message;
    onDone();
  });
}
</script>

</body>
</html>
