<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>KULBATSKII OS</title>
<style>
:root {
  --bg:#060606;
  --bg2:#0a0a0a;
  --bg3:#0e0e0e;
  --bg4:#111;
  --border:#1a1a1a;
  --border2:#222;
  --text:#f0ece4;
  --text2:#b0aca8;
  --text3:#555;
  --text4:#2a2a2a;
  --accent:#e8735a;
  --accent2:#c4502a;
  --green:#4caf50;
  --blue:#4a9eff;
  --purple:#c678dd;
  --gold:#e8c07d;
  --indigo:#7c6aff;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(–bg);color:var(–text);font-family:Georgia,serif;overflow:hidden}
::-webkit-scrollbar{display:none}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto;position:relative}
#header{flex-shrink:0;height:56px;background:var(–bg2);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10}
#screens{flex:1;overflow:hidden;position:relative}
#navbar{flex-shrink:0;height:64px;background:var(–bg2);border-top:1px solid var(–border);display:flex;padding-bottom:env(safe-area-inset-bottom)}

/* ── HEADER ── */
.h-logo{display:flex;align-items:center;gap:8px;flex:1}
.h-icon{color:var(–accent);font-size:20px}
.h-title{color:var(–text);font-size:17px;font-weight:800;letter-spacing:.5px;font-family:Helvetica,sans-serif}
.h-badge{background:var(–bg4);border:1px solid var(–border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(–text3);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:Helvetica,sans-serif}
.h-badge span{color:var(–accent);font-weight:800}

/* ── NAV ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;padding:8px 0}
.nav-icon{font-size:20px;opacity:.3;transition:opacity .2s}
.nav-label{font-size:10px;color:var(–text4);letter-spacing:1px;font-family:Helvetica,sans-serif;font-weight:700;transition:color .2s}
.nav-btn.active .nav-icon{opacity:1}
.nav-btn.active .nav-label{color:var(–accent)}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;overflow-y:auto;transition:opacity .2s,transform .2s;will-change:transform}
.screen.hidden{opacity:0;pointer-events:none;transform:translateX(20px)}

/* ── CHAT ── */
#chatScreen{display:flex;flex-direction:column}
#messages{flex:1;overflow-y:auto;padding:16px 14px 8px}
#quickBar{padding:0 14px 10px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
.quick-chip{flex-shrink:0;padding:7px 14px;background:var(–bg3);border:1px solid var(–border);border-radius:20px;color:var(–text3);font-size:12px;cursor:pointer;white-space:nowrap;font-family:Helvetica,sans-serif}
#inputBar{flex-shrink:0;background:var(–bg2);border-top:1px solid var(–border);padding:10px 12px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:var(–bg3);border-radius:22px;border:1px solid var(–border);padding:10px 16px;display:flex;align-items:center}
#msgInput{width:100%;background:transparent;border:none;outline:none;color:var(–text);font-size:15px;line-height:1.5;font-family:Georgia,serif;resize:none;max-height:100px;overflow-y:auto;caret-color:var(–accent)}
.send-btn{width:44px;height:44px;border-radius:22px;border:none;background:var(–bg4);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.send-btn.on{background:var(–accent);box-shadow:0 0 20px rgba(232,115,90,.35)}

/* ── AGENT PICKER ── */
#agentPicker{background:var(–bg2);border-bottom:1px solid var(–border);padding:12px 14px;flex-shrink:0;display:none}
#agentPicker.open{display:block}
.picker-label{color:var(–text4);font-size:10px;letter-spacing:3px;margin-bottom:10px;font-family:Helvetica,sans-serif}
.picker-chips{display:flex;flex-wrap:wrap;gap:7px}
.agent-chip{display:flex;align-items:center;gap:5px;padding:6px 13px;background:var(–bg4);border:1px solid var(–border2);border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;color:var(–text3);font-family:Helvetica,sans-serif;transition:all .15s}
.agent-chip.on{background:var(–chip-bg);border-color:var(–chip-color);color:var(–chip-color)}

/* ── BUBBLES ── */
.bubble-wrap{margin-bottom:16px;animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
.bubble-wrap.user{display:flex;justify-content:flex-end}
.bubble-user{max-width:82%;background:#161622;border:1px solid #2a2a44;border-radius:18px 18px 4px 18px;padding:12px 16px}
.bubble-user p{color:var(–text);font-size:15px;line-height:1.65}
.bubble-agent{display:flex;gap:10px}
.agent-ava{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.agent-body{flex:1;min-width:0}
.agent-meta{display:flex;gap:6px;align-items:baseline;margin-bottom:5px}
.agent-name{font-size:12px;font-weight:700;font-family:Helvetica,sans-serif}
.agent-role{font-size:10px;color:var(–text4);font-family:Helvetica,sans-serif}
.agent-msg{background:var(–bg4);border-radius:4px 18px 18px 18px;padding:14px 16px}
.agent-msg p{color:#c8c4bc;font-size:15px;line-height:1.75}
.typing-dots{display:flex;gap:5px;align-items:center;padding:14px 16px;background:var(–bg4);border-radius:4px 18px 18px 18px}
.dot{width:6px;height:6px;border-radius:3px;opacity:.5;animation:bounce .9s ease-in-out infinite}
.cursor{display:inline-block;width:2px;height:14px;vertical-align:text-bottom;margin-left:2px;animation:blink .7s step-end infinite;opacity:.6}

/* ── STUDIO ── */
#studioScreen{display:flex;flex-direction:column}
#studioInput{flex:1;overflow-y:auto;padding:28px 18px 24px}
.studio-eyebrow{color:var(–accent);font-size:10px;letter-spacing:4px;margin-bottom:10px;font-family:Helvetica,sans-serif}
.studio-h1{color:var(–text);font-size:28px;font-weight:800;line-height:1.15;margin-bottom:20px;letter-spacing:-.5px;font-family:Helvetica,sans-serif}
.studio-h1 em{color:var(–accent);font-style:normal}
.fmt-badges{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.fmt-badge{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid;font-size:11px;font-weight:700;font-family:Helvetica,sans-serif}
.idea-box{background:var(–bg3);border:1px solid var(–border);border-radius:18px;padding:14px 16px;margin-bottom:12px}
#ideaInput{width:100%;background:transparent;border:none;outline:none;color:var(–text);font-size:16px;line-height:1.75;resize:none;caret-color:var(–accent)}
.idea-count{text-align:right;color:var(–text4);font-size:11px;margin-top:4px;font-family:Helvetica,sans-serif}
.example-btn{display:block;width:100%;text-align:left;padding:12px 14px;background:transparent;border:1px solid #111;border-radius:14px;color:#444;font-size:14px;cursor:pointer;font-family:Georgia,serif;line-height:1.5;margin-bottom:8px;transition:border-color .15s,color .15s}
.example-btn:hover{border-color:var(–border2);color:var(–text3)}
#studioFooter{flex-shrink:0;padding:14px 16px;background:var(–bg);border-top:1px solid var(–border)}
.gen-btn{width:100%;height:54px;border:none;border-radius:18px;font-size:16px;font-weight:800;cursor:pointer;background:var(–bg3);color:var(–text4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;font-family:Helvetica,sans-serif}
.gen-btn.on{background:linear-gradient(135deg,var(–accent),var(–accent2));color:#fff;box-shadow:0 4px 28px rgba(232,115,90,.3)}

/* ── STUDIO RESULT ── */
#studioResult{flex:1;display:flex;flex-direction:column;overflow:hidden}
.fmt-tabs{display:flex;background:var(–bg2);border-bottom:1px solid var(–border);flex-shrink:0}
.fmt-tab{flex:1;padding:12px 4px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:border-color .2s}
.fmt-tab.active{border-bottom-color:var(–tab-color)}
.fmt-tab-icon{font-size:16px;opacity:.3;transition:opacity .2s;position:relative}
.fmt-tab.active .fmt-tab-icon{opacity:1}
.fmt-tab-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(–text4);font-family:Helvetica,sans-serif;transition:color .2s}
.fmt-tab.active .fmt-tab-label{color:var(–tab-color)}
.tab-spinner{position:absolute;inset:-6px;animation:spin .9s linear infinite}
.tab-dot{position:absolute;top:-1px;right:-3px;width:7px;height:7px;border-radius:4px;border:1.5px solid var(–bg2)}
.fmt-content{flex:1;overflow-y:auto;padding:20px 16px 24px}
.result-bar{flex-shrink:0;background:var(–bg2);border-top:1px solid var(–border);padding:10px 12px;display:flex;gap:8px;align-items:center}
.result-pill{flex:1;background:var(–bg3);border:1px solid var(–border);border-radius:10px;padding:8px 12px;overflow:hidden}
.result-pill p{color:var(–text4);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:Helvetica,sans-serif}
.icon-btn{width:40px;height:40px;background:var(–bg3);border:1px solid var(–border);border-radius:12px;color:var(–text3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.back-btn{padding:0 14px;height:40px;background:var(–bg3);border:1px solid var(–border);border-radius:12px;color:var(–text3);font-size:13px;cursor:pointer;flex-shrink:0;font-family:Helvetica,sans-serif}
.pub-btn{padding:0 16px;height:40px;border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0;font-family:Helvetica,sans-serif}

/* ── CONTENT CARDS ── */
.post-card{background:#10101f;border:1px solid #2a2a4a;border-radius:20px;padding:20px}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1e1e3a}
.post-ava{width:40px;height:40px;border-radius:20px;background:var(–accent);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;flex-shrink:0;font-family:Helvetica,sans-serif}
.post-uname{color:var(–text);font-weight:700;font-size:14px;font-family:Helvetica,sans-serif}
.post-time{color:#444;font-size:11px;font-family:Helvetica,sans-serif}
.post-hook{color:var(–text);font-size:17px;font-weight:700;line-height:1.35;margin-bottom:14px}
.post-body{color:var(–text2);font-size:15px;line-height:1.8;margin-bottom:14px;white-space:pre-line}
.post-insight{border-left:2px solid #c678dd44;padding-left:12px;margin-bottom:12px}
.post-insight p{color:var(–purple);font-size:14px;font-style:italic;line-height:1.6}
.post-cta{color:var(–blue);font-size:14px;margin-bottom:10px}
.post-tags{color:var(–text4);font-size:12px}

.thread-item{display:flex;gap:10px;margin-bottom:4px}
.thread-num{width:36px;height:36px;border-radius:18px;background:#1a2a4a;border:1px solid #2a4a7a;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(–blue);font-weight:700;flex-shrink:0;font-family:Helvetica,sans-serif}
.thread-line{width:1px;flex:1;min-height:20px;background:#1a2a4a;margin:4px 0}
.thread-text{padding-top:8px;padding-bottom:16px;flex:1;color:#c8c4bc;font-size:15px;line-height:1.7}

.article-h1{color:var(–text);font-size:22px;font-weight:700;line-height:1.2;margin-bottom:12px}
.article-lead{color:#888;font-size:15px;line-height:1.7;margin-bottom:16px;font-style:italic}
.article-divider{width:32px;height:2px;background:var(–green);margin-bottom:20px}
.article-h2{color:var(–green);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;font-family:Helvetica,sans-serif}
.article-p{color:var(–text2);font-size:15px;line-height:1.8;margin-bottom:18px}
.article-close{color:var(–gold);font-size:15px;line-height:1.75;margin-top:12px;font-style:italic}

.script-title{color:var(–text);font-size:16px;font-weight:700;margin-bottom:10px;font-family:Helvetica,sans-serif}
.script-hook{background:#1a0a08;border:1px solid #3a1510;border-radius:12px;padding:14px;margin-bottom:14px}
.script-hook-label{color:var(–accent);font-size:10px;letter-spacing:2px;margin-bottom:6px;font-family:Helvetica,sans-serif}
.script-hook-text{color:var(–text);font-size:15px;line-height:1.6}
.script-row{display:flex;gap:12px;margin-bottom:10px}
.script-time{color:var(–accent);font-size:12px;font-weight:700;flex-shrink:0;padding-top:2px;width:32px;font-family:Helvetica,sans-serif}
.script-cell{flex:1;background:var(–bg4);border-radius:10px;padding:10px 12px;border:1px solid var(–border)}
.script-visual{color:#444;font-size:11px;margin-bottom:4px}
.script-voice{color:#c8c4bc;font-size:14px;line-height:1.6}
.script-cta{background:#0a1a0a;border-radius:12px;padding:12px 14px;border:1px solid #1a3a1a;margin-top:10px;color:var(–green);font-size:14px}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>

</head>

// ── CONFIG ──────────────────────────────────────────────
var AGENTS = [

var FORMATS = [
  {id:"post",    icon:"✍", label:"Пост",   color:"#c678dd",

   prompt:function(t){return "Напиши видеоскрипт на тему: "+t}},
];

var QUICK = ["Как монетизировать AI-контент?","Архитектура агентов","TON + контент = ?","Что автоматизировать первым?"];
var EXAMPLES = ["TON-кошельки и победа крипты над банками","Как строить AI-офис из автономных агентов","Каждая мысль может стоить денег — вот как"];

// ── STATE ──
var activeAgents = AGENTS.map(function(a){return a.id;});
var chatHistory = [];
var chatBusy = false;
var currentTab = "chat";
var studioStreams = {};
var studioDones = {};
var activeFmt = "post";
var currentIdea = "";

// ── INIT ──
function init(){
  renderPickerChips();
  renderQuickBar();
  renderFmtBadges();
  renderExamples();
  renderFmtTabs();
  addMsg({role:"assistant", agentId:"master", text:"Привет. Шесть агентов готовы.\n\nПоделись идеей — разберём с каждого угла."});
}

// ── TAB SWITCH ──
function switchTab(tab){
  currentTab = tab;
  document.getElementById("chatScreen").classList.toggle("hidden", tab!=="chat");
  document.getElementById("studioScreen").classList.toggle("hidden", tab!=="studio");
  document.getElementById("nav-chat").classList.toggle("active", tab==="chat");
  document.getElementById("nav-studio").classList.toggle("active", tab!=="chat");
  document.getElementById("agentToggle").style.display = tab==="chat"?"flex":"none";
}

// ── AGENT PICKER ──
function renderPickerChips(){
  var html = "";
  AGENTS.forEach(function(a){
    var on = activeAgents.indexOf(a.id)>=0;
    html += '<button class="agent-chip'+(on?" on":"")+'" style="--chip-color:'+a.color+';--chip-bg:'+a.color+'18" onclick="toggleAgent(\''+a.id+'\')">'
      +'<span>'+a.emoji+'</span><span>'+a.name+'</span></button>';
  });
  document.getElementById("pickerChips").innerHTML = html;
  document.getElementById("agentCount").textContent = activeAgents.length;
}

function toggleAgent(id){
  var i = activeAgents.indexOf(id);
  if(i>=0){ if(activeAgents.length>1) activeAgents.splice(i,1); }
  else activeAgents.push(id);
  renderPickerChips();
}

function togglePicker(){
  document.getElementById("agentPicker").classList.toggle("open");
}

// ── CHAT ──
function renderQuickBar(){
  var bar = document.getElementById("quickBar");
  var html = "";
  QUICK.forEach(function(q){
    html += '<button class="quick-chip" onclick="setMsg(this)">'+q+'</button>';
  });
  bar.innerHTML = html;
}

function setMsg(btn){
  document.getElementById("msgInput").value = btn.textContent;
  onMsgInput();
}

function onMsgInput(){
  var v = document.getElementById("msgInput").value.trim();
  var btn = document.getElementById("sendBtn");
  var arrow = document.getElementById("sendArrow");
  btn.classList.toggle("on", !!v && !chatBusy);
  if(arrow) arrow.setAttribute("stroke", v&&!chatBusy?"#fff":"#555");
  document.getElementById("quickBar").style.display = v?"none":"flex";
}

function onMsgKey(e){
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}

async function sendMsg(){
  var input = document.getElementById("msgInput");
  var msg = input.value.trim();
  if(!msg || chatBusy) return;
  input.value = "";
  onMsgInput();
  chatBusy = true;

  var uMsg = {role:"user", text:msg};
  chatHistory.push(uMsg);
  addMsg(uMsg);

  var hist = chatHistory.slice(-10).map(function(m){
    return {role:m.role==="user"?"user":"assistant", content:m.text||"…"};
  });

  var toRun = AGENTS.filter(function(a){ return activeAgents.indexOf(a.id)>=0; });

  for(var i=0; i<toRun.length; i++){
    var agent = toRun[i];
    var id = "msg-"+Date.now()+"-"+i;
    addTyping(agent, id);
    await delay(200);
    await new Promise(function(resolve){
      streamToEl(agent.system, hist, id, agent.color, function(text){
        chatHistory.push({role:"assistant", agentId:agent.id, text:text});
        hist.push({role:"assistant", content:agent.name+": "+text});
        resolve();
      });
    });
    await delay(150);
  }
  chatBusy = false;
  onMsgInput();
}

function addMsg(msg){
  var el = document.createElement("div");
  el.className = "bubble-wrap" + (msg.role==="user"?" user":"");
  if(msg.role==="user"){
    el.innerHTML = '<div class="bubble-user"><p>'+esc(msg.text)+'</p></div>';
  } else {
    var agent = AGENTS.find(function(a){return a.id===msg.agentId;})||AGENTS[0];
    el.innerHTML = '<div class="bubble-agent">'
      +'<div class="agent-ava" style="background:'+agent.color+'18;border:1.5px solid '+agent.color+'50;color:'+agent.color+'">'+agent.emoji+'</div>'
      +'<div class="agent-body">'
        +'<div class="agent-meta">'
          +'<span class="agent-name" style="color:'+agent.color+'">'+agent.name+'</span>'
          +'<span class="agent-role">'+agent.role+'</span>'
        +'</div>'
        +'<div class="agent-msg"><p>'+formatText(msg.text)+'</p></div>'
      +'</div>'
    +'</div>';
  }
  document.getElementById("messages").appendChild(el);
  scrollBottom();
}

function addTyping(agent, id){
  var el = document.createElement("div");
  el.className = "bubble-wrap";
  el.id = id;
  el.innerHTML = '<div class="bubble-agent">'
    +'<div class="agent-ava" style="background:'+agent.color+'18;border:1.5px solid '+agent.color+'50;color:'+agent.color+'">'+agent.emoji+'</div>'
    +'<div class="agent-body">'
      +'<div class="agent-meta"><span class="agent-name" style="color:'+agent.color+'">'+agent.name+'</span><span class="agent-role">'+agent.role+'</span></div>'
      +'<div class="typing-dots">'
        +'<div class="dot" style="background:'+agent.color+';animation-delay:0s"></div>'
        +'<div class="dot" style="background:'+agent.color+';animation-delay:.15s"></div>'
        +'<div class="dot" style="background:'+agent.color+';animation-delay:.3s"></div>'
      +'</div>'
    +'</div>'
  +'</div>';
  document.getElementById("messages").appendChild(el);
  scrollBottom();
}

function streamToEl(system, messages, elId, color, onDone){
  fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:system, messages:messages})
  }).then(function(res){
    var reader = res.body.getReader(), dec = new TextDecoder(), full = "", buf = "";
    function read(){
      reader.read().then(function(r){
        if(r.done){
          var el = document.getElementById(elId);
          if(el){
            var dots = el.querySelector(".typing-dots");
            if(dots) dots.outerHTML = '<div class="agent-msg"><p>'+formatText(full)+'</p></div>';
            var cur = el.querySelector(".cursor"); if(cur) cur.remove();
          }
          onDone(full); return;
        }
        buf += dec.decode(r.value,{stream:true});
        var lines = buf.split("\n"); buf = lines.pop()||"";
        lines.forEach(function(line){
          if(!line.startsWith("data: ")) return;
          var raw = line.slice(6).trim(); if(raw==="[DONE]") return;
          try{
            var evt = JSON.parse(raw), t = (evt.delta&&evt.delta.text)||"";
            if(t){
              full += t;
              var el2 = document.getElementById(elId);
              if(el2){
                var dots = el2.querySelector(".typing-dots");
                if(dots) dots.outerHTML = '<div class="agent-msg"><p id="p-'+elId+'">'+formatText(full)+'<span class="cursor" style="background:'+color+'"></span></p></div>';
                else{ var p = el2.querySelector(".agent-msg p"); if(p) p.innerHTML = formatText(full)+'<span class="cursor" style="background:'+color+'"></span>'; }
              }
              scrollBottom();
            }
          }catch(e){}
        });
        read();
      }).catch(function(){onDone(full);});
    }
    read();
  }).catch(function(e){
    var el = document.getElementById(elId);
    if(el){ var p = el.querySelector("p"); if(p) p.textContent = "Ошибка: "+e.message; }
    onDone("");
  });
}

function scrollBottom(){
  var m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// ── STUDIO ──
function renderFmtBadges(){
  var html = "";
  FORMATS.forEach(function(f){
    html += '<div class="fmt-badge" style="color:'+f.color+';background:'+f.color+'0e;border-color:'+f.color+'28">'
      +'<span>'+f.icon+'</span><span>'+f.label+'</span></div>';
  });
  document.getElementById("fmtBadges").innerHTML = html;
}

function renderExamples(){
  var html = "";
  EXAMPLES.forEach(function(ex){
    html += '<button class="example-btn" onclick="setIdea(this)">'+ex+'</button>';
  });
  document.getElementById("exampleBtns").innerHTML = html;
}

function setIdea(btn){
  document.getElementById("ideaInput").value = btn.textContent;
  onIdeaInput();
}

function onIdeaInput(){
  var v = document.getElementById("ideaInput").value;
  document.getElementById("ideaCount").textContent = v.length;
  document.getElementById("genBtn").className = "gen-btn"+(v.trim()?" on":"");
}

function renderFmtTabs(){
  var html = "";
  FORMATS.forEach(function(f){
    html += '<button class="fmt-tab" id="tab-'+f.id+'" style="--tab-color:'+f.color+'" onclick="setFmt(\''+f.id+'\')">'
      +'<span class="fmt-tab-icon" id="ti-'+f.id+'">'+f.icon+'</span>'
      +'<span class="fmt-tab-label">'+f.label.toUpperCase()+'</span>'
    +'</button>';
  });
  document.getElementById("fmtTabs").innerHTML = html;
}

function setFmt(id){
  activeFmt = id;
  FORMATS.forEach(function(f){
    document.getElementById("tab-"+f.id).classList.toggle("active", f.id===id);
  });
  renderFmtContent();
  var fmt = FORMATS.find(function(f){return f.id===id;});
  if(fmt) document.getElementById("pubBtn").style.background = fmt.color;
}

function generate(){
  var idea = document.getElementById("ideaInput").value.trim();
  if(!idea) return;
  currentIdea = idea;
  studioStreams = {}; studioDones = {};
  document.getElementById("resultPill").textContent = idea;
  document.getElementById("studioResult").style.display = "flex";
  activeFmt = "post";
  renderFmtTabs();
  document.getElementById("tab-post").classList.add("active");
  document.getElementById("pubBtn").style.background = FORMATS[0].color;
  renderFmtContent();

  FORMATS.forEach(function(fmt){
    startSpinner(fmt.id, fmt.color);
    fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:fmt.system, messages:[{role:"user", content:fmt.prompt(idea)}]})
    }).then(function(res){
      var reader = res.body.getReader(), dec = new TextDecoder(), full = "", buf = "";
      function read(){
        reader.read().then(function(r){
          if(r.done){
            studioDones[fmt.id] = true;
            stopSpinner(fmt.id, fmt.color);
            if(activeFmt===fmt.id) renderFmtContent();
            return;
          }
          buf += dec.decode(r.value,{stream:true});
          var lines = buf.split("\n"); buf = lines.pop()||"";
          lines.forEach(function(line){
            if(!line.startsWith("data: ")) return;
            var raw = line.slice(6).trim(); if(raw==="[DONE]") return;
            try{
              var evt = JSON.parse(raw), t = (evt.delta&&evt.delta.text)||"";
              if(t){ full += t; studioStreams[fmt.id] = full; if(activeFmt===fmt.id) renderFmtContent(); }
            }catch(e){}
          });
          read();
        }).catch(function(){studioDones[fmt.id]=true; stopSpinner(fmt.id,fmt.color);});
      }
      read();
    }).catch(function(e){
      studioStreams[fmt.id] = "Ошибка: "+e.message;
      studioDones[fmt.id] = true;
      stopSpinner(fmt.id, fmt.color);
      if(activeFmt===fmt.id) renderFmtContent();
    });
  });
}

function startSpinner(id, color){
  var el = document.getElementById("ti-"+id);
  if(!el) return;
  el.innerHTML = el.textContent
    +'<svg class="tab-spinner" width="36" height="36" viewBox="0 0 36 36">'
    +'<circle cx="18" cy="18" r="14" fill="none" stroke="'+color+'" stroke-width="2" stroke-dasharray="60 30" stroke-linecap="round"/>'
    +'</svg>';
}

function stopSpinner(id, color){
  var el = document.getElementById("ti-"+id);
  if(!el) return;
  var icon = FORMATS.find(function(f){return f.id===id;});
  el.innerHTML = (icon?icon.icon:"")
    +'<span class="tab-dot" style="background:'+color+'"></span>';
}

function renderFmtContent(){
  var raw = studioStreams[activeFmt]||"";
  var done = !!studioDones[activeFmt];
  var html = "";
  var cur = done ? '' : '<span class="cursor" style="background:'+getFmtColor()+'"></span>';

  if(activeFmt==="post")    html = renderPost(raw, cur);
  else if(activeFmt==="thread")  html = renderThread(raw, cur);
  else if(activeFmt==="article") html = renderArticle(raw, cur);
  else if(activeFmt==="script")  html = renderScript(raw, cur);

  document.getElementById("fmtContent").innerHTML = html||'<p style="color:#1e1e1e;font-size:14px;padding-top:20px">Генерация…</p>';
}

function getFmtColor(){
  var f = FORMATS.find(function(f){return f.id===activeFmt;});
  return f ? f.color : "#e8735a";
}

function gf(raw, k){
  var m = raw.match(new RegExp(k+":\\s*([^\\n]+)"));
  return m ? m[1].trim() : "";
}

function renderPost(raw, cur){
  var body = raw.replace(/HOOK:[^\n]*\n?|INSIGHT:[^\n]*\n?|CTA:[^\n]*\n?|TAGS:[^\n]*\n?|BODY:\s*/g,"").trim();
  return '<div class="post-card">'
    +'<div class="post-header"><div class="post-ava">K</div><div><div class="post-uname">KULBATSKII</div><div class="post-time">только что</div></div></div>'
    +(gf(raw,"HOOK")?'<p class="post-hook">'+esc(gf(raw,"HOOK"))+'</p>':"")
    +(body?'<p class="post-body">'+esc(body)+'</p>':"")
    +(gf(raw,"INSIGHT")?'<div class="post-insight"><p>'+esc(gf(raw,"INSIGHT"))+'</p></div>':"")
    +(gf(raw,"CTA")?'<p class="post-cta">👉 '+esc(gf(raw,"CTA"))+'</p>':"")
    +(gf(raw,"TAGS")?'<p class="post-tags">'+esc(gf(raw,"TAGS"))+'</p>':"")
    +cur+'</div>';
}

function renderThread(raw, cur){
  var tweets = ["T1","T2","T3","T4","T5"].map(function(k){return gf(raw,k);}).filter(Boolean);
  var html = '';
  tweets.forEach(function(t,i){
    html += '<div class="thread-item">'
      +'<div style="display:flex;flex-direction:column;align-items:center">'
        +'<div class="thread-num">'+(i+1)+'</div>'
        +(i<tweets.length-1?'<div class="thread-line"></div>':"")
      +'</div>'
      +'<div class="thread-text">'+esc(t)+'</div>'
    +'</div>';
  });
  return html+cur;
}

function renderArticle(raw, cur){
  var sections = [];
  var re = /H2:\s*([^\n]+)\n(P\d):\s*([\s\S]+?)(?=H2:|CLOSE:|$)/g, m;
  while((m=re.exec(raw))!==null) sections.push({h:m[1], p:m[3].replace(/P\d:\s*/,"").trim()});
  var html = '';
  if(gf(raw,"HEADLINE")) html += '<h2 class="article-h1">'+esc(gf(raw,"HEADLINE"))+'</h2>';
  if(gf(raw,"LEAD"))     html += '<p class="article-lead">'+esc(gf(raw,"LEAD"))+'</p><div class="article-divider"></div>';
  sections.forEach(function(s){
    html += '<p class="article-h2">'+esc(s.h)+'</p><p class="article-p">'+esc(s.p)+'</p>';
  });
  if(gf(raw,"CLOSE")) html += '<p class="article-close">'+esc(gf(raw,"CLOSE"))+'</p>';
  return html+cur;
}

function renderScript(raw, cur){
  var html = '';
  if(gf(raw,"TITLE")) html += '<p class="script-title">'+esc(gf(raw,"TITLE"))+'</p>';
  if(gf(raw,"HOOK"))  html += '<div class="script-hook"><p class="script-hook-label">КРЮЧОК (0–5 сек)</p><p class="script-hook-text">'+esc(gf(raw,"HOOK"))+'</p></div>';
  var lines = raw.split('\n');
  lines.forEach(function(line){
    var m = line.match(/^(\d{1,2}:\d{2})\s*\|\s*([^|]+)\s*\|\s*(.+)$/);
    if(!m) return;
    html += '<div class="script-row">'
      +'<span class="script-time">'+esc(m[1])+'</span>'
      +'<div class="script-cell">'
        +'<p class="script-visual">📹 '+esc(m[2].trim())+'</p>'
        +'<p class="script-voice">🎙 '+esc(m[3].trim())+'</p>'
      +'</div></div>';
  });
  if(gf(raw,"CTA")) html += '<div class="script-cta">🎯 '+esc(gf(raw,"CTA"))+'</div>';
  return html+cur;
}

function backToInput(){
  document.getElementById("studioResult").style.display = "none";
}

function copyResult(){
  var raw = studioStreams[activeFmt]||"";
  navigator.clipboard.writeText(raw).then(function(){
    var btn = document.getElementById("copyBtn");
    btn.textContent = "✓"; btn.style.color = "#4caf50"; btn.style.borderColor = "#4caf50";
    setTimeout(function(){ btn.textContent="⎘"; btn.style.color=""; btn.style.borderColor=""; }, 1800);
  });
}

// ── UTILS ──
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function formatText(s){ return esc(s).replace(/\n/g,"<br>"); }
function delay(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

init();
</script>

</body>
</html>
