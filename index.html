<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KULBATSKII OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060606;color:#f0ece4;font-family:Georgia,serif;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:24px 16px 60px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo span:first-child{color:#e8735a;font-size:22px}
.logo span:last-child{color:#fff;font-size:18px;font-weight:800;letter-spacing:1px}
.sub{color:#2a2a2a;font-size:11px;letter-spacing:2px;margin-bottom:28px}
textarea{width:100%;background:#0e0e0e;border:1px solid #1a1a1a;border-radius:14px;color:#f0ece4;font-size:16px;padding:14px;outline:none;font-family:Georgia,serif;resize:none;caret-color:#e8735a;display:block;margin-bottom:12px}
.hints{margin-bottom:16px}
.hint{display:block;width:100%;text-align:left;background:transparent;border:1px solid #111;border-radius:12px;padding:10px 14px;color:#333;font-size:14px;cursor:pointer;font-family:Georgia,serif;line-height:1.5;margin-bottom:7px}
.hint:hover{border-color:#222;color:#555}
#launchBtn{width:100%;height:52px;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;background:#111;color:#222;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
#launchBtn.on{background:linear-gradient(135deg,#e8735a,#c4502a);color:#fff;box-shadow:0 4px 24px rgba(232,115,90,.3)}
#launchBtn:disabled{background:#111;color:#222;cursor:default;box-shadow:none}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:#0a0a0a;border:1px solid #111;border-radius:16px;padding:18px;transition:border-color .4s}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-emoji{font-size:18px}
.card-name{font-size:11px;font-weight:800;letter-spacing:3px}
.dot{width:6px;height:6px;border-radius:3px;display:inline-block;margin-left:4px;animation:pulse 1s ease-in-out infinite}
.done-mark{color:#222;font-size:10px;margin-left:auto}
.card-text{color:#b0aca8;font-size:15px;line-height:1.8;white-space:pre-wrap;min-height:18px}
.cur{display:inline-block;width:2px;height:14px;vertical-align:text-bottom;margin-left:2px;animation:blink .7s step-end infinite}
.new-btn{display:flex;justify-content:center;margin-top:20px}
.new-btn button{background:transparent;border:1px solid #1a1a1a;border-radius:12px;color:#333;font-size:13px;padding:10px 20px;cursor:pointer}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="app">
  <div class="logo"><span>✦</span><span>KULBATSKII OS</span></div>
  <p class="sub">3 АГЕНТА · ПАРАЛЛЕЛЬНЫЙ СТРИМИНГ</p>

  <div id="inputSection">
    <textarea id="idea" rows="4" placeholder="Введи идею или задачу…" oninput="onInput()"></textarea>
    <div class="hints">
      <button class="hint" onclick="setIdea(this)">Как превратить AI-контент в SaaS?</button>
      <button class="hint" onclick="setIdea(this)">TON-кошельки против банков: бизнес-идея</button>
      <button class="hint" onclick="setIdea(this)">Агентная сеть для автоматизации Instagram</button>
    </div>
    <button id="launchBtn" onclick="launch()" disabled>✦ Запустить агентов</button>
  </div>

  <div id="resultSection" style="display:none">
    <div class="cards">
      <div class="card" id="card-master">
        <div class="card-head">
          <span class="card-emoji" style="color:#e8735a">✦</span>
          <span class="card-name" style="color:#e8735a">MASTER</span>
          <span class="dot" id="dot-master" style="background:#e8735a"></span>
        </div>
        <p class="card-text" id="text-master"></p>
      </div>
      <div class="card" id="card-biz">
        <div class="card-head">
          <span class="card-emoji" style="color:#4caf50">◈</span>
          <span class="card-name" style="color:#4caf50">BIZ</span>
          <span class="dot" id="dot-biz" style="background:#4caf50"></span>
        </div>
        <p class="card-text" id="text-biz"></p>
      </div>
      <div class="card" id="card-mind">
        <div class="card-head">
          <span class="card-emoji" style="color:#e8c07d">◎</span>
          <span class="card-name" style="color:#e8c07d">MIND</span>
          <span class="dot" id="dot-mind" style="background:#e8c07d"></span>
        </div>
        <p class="card-text" id="text-mind"></p>
      </div>
    </div>
    <div class="new-btn"><button onclick="reset()">← Новая идея</button></div>
  </div>
</div>

<script>
var AGENTS = [
  {id:"master", color:"#e8735a", system:"Ты — Master-агент. Анализируй идею на 3 уровнях: технология, ROI, философия. Вынеси вердикт: Go или Redesign. Отвечай по-русски, до 100 слов."},
  {id:"biz",    color:"#4caf50", system:"Ты — Biz-агент. Оцени unit-экономику и монетизацию. Назови 2-3 способа заработать на этой идее. Отвечай по-русски, до 100 слов."},
  {id:"mind",   color:"#e8c07d", system:"Ты — Mind-агент. Найди суть и долгосрочную ценность идеи. Задай главный вопрос, который автор ещё не задал себе. Отвечай по-русски, до 100 слов."},
];

function onInput(){
  var v = document.getElementById("idea").value.trim();
  var btn = document.getElementById("launchBtn");
  btn.disabled = !v;
  btn.className = v ? "on" : "";
}

function setIdea(btn){
  document.getElementById("idea").value = btn.textContent;
  onInput();
}

function reset(){
  document.getElementById("resultSection").style.display = "none";
  document.getElementById("inputSection").style.display = "block";
  AGENTS.forEach(function(a){
    document.getElementById("text-"+a.id).innerHTML = "";
    document.getElementById("dot-"+a.id).style.display = "inline-block";
    document.getElementById("card-"+a.id).style.borderColor = "#111";
  });
}

function launch(){
  var msg = document.getElementById("idea").value.trim();
  if(!msg) return;
  document.getElementById("inputSection").style.display = "none";
  document.getElementById("resultSection").style.display = "block";

  var done = 0;
  AGENTS.forEach(function(agent){
    stream(agent, msg, function(){
      done++;
    });
  });
}

function stream(agent, msg, onDone){
  fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      system: agent.system,
      messages: [{role:"user", content:msg}]
    })
  }).then(function(res){
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    var full = "", buf = "";

    function read(){
      reader.read().then(function(r){
        if(r.done){
          var dot = document.getElementById("dot-"+agent.id);
          if(dot) dot.style.display = "none";
          var el = document.getElementById("text-"+agent.id);
          if(el){ var c = el.querySelector(".cur"); if(c) c.remove(); }
          var card = document.getElementById("card-"+agent.id);
          if(card) card.style.borderColor = agent.color+"44";
          onDone();
          return;
        }
        buf += dec.decode(r.value, {stream:true});
        var lines = buf.split("\n");
        buf = lines.pop() || "";
        lines.forEach(function(line){
          if(!line.startsWith("data: ")) return;
          var raw = line.slice(6).trim();
          if(raw === "[DONE]") return;
          try{
            var evt = JSON.parse(raw);
            var t = (evt.delta && evt.delta.text) || "";
            if(t){
              full += t;
              var el = document.getElementById("text-"+agent.id);
              if(el) el.innerHTML = full + '<span class="cur" style="background:'+agent.color+'"></span>';
            }
          }catch(e){}
        });
        read();
      }).catch(function(e){ onDone(); });
    }
    read();
  }).catch(function(e){
    var el = document.getElementById("text-"+agent.id);
    if(el) el.textContent = "Ошибка: " + e.message;
    onDone();
  });
}
</script>

</body>
</html>
